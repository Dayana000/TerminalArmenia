<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — Terminal Armenia</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-brand">
      <div class="logo-ring">🚌</div>
      <h1>Terminal Armenia</h1>
      <p>Sistema Digital de Gestión de Tiquetes</p>
    </div>

    <div class="auth-card">
      <h2>Iniciar Sesión</h2>
      <p class="subtitle">Ingresa con tu correo y contraseña</p>

      <div class="form-group">
        <label>Correo electrónico</label>
        <input id="email" type="email" placeholder="tu@correo.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn btn-primary" id="loginBtn" onclick="login()">
        <span id="btnText">Ingresar al sistema</span>
        <span id="btnSpinner" class="spinner" style="display:none;"></span>
      </button>

      <p class="link-line">¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="utils.js"></script>
  <script src="login.js"></script>
</body>
</html>
